services:
  postgres:
    image: postgres:16-alpine
    container_name: factory_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
      POSTGRES_DB: factory
    ports:
      - "5432:5432"
    volumes:
      - factory_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: factory_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - factory_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  factory_pg:
  factory_redis:
