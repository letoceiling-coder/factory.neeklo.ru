# Reverse proxy for factory.neeklo.ru (host-level nginx with SSL).
# Place in /etc/nginx/sites-available/factory.neeklo.ru.conf and symlink to sites-enabled.
# Issue cert first via: certbot certonly --webroot -w /var/www/certbot -d factory.neeklo.ru

server {
    listen 80;
    listen [::]:80;
    server_name factory.neeklo.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name factory.neeklo.ru;

    ssl_certificate     /etc/letsencrypt/live/factory.neeklo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/factory.neeklo.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/factory.neeklo.ru.access.log;
    error_log  /var/log/nginx/factory.neeklo.ru.error.log;

    client_max_body_size 500m;

    # Backend API (backend container on 127.0.0.1:3096)
    location /api/ {
        proxy_pass http://127.0.0.1:3096/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Frontend SPA (frontend container on 127.0.0.1:8090)
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
