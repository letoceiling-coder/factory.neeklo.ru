services:
  postgres:
    image: postgres:16-alpine
    container_name: factory_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factory}
      POSTGRES_DB: ${POSTGRES_DB:-factory}
    volumes:
      - factory_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: factory_redis
    restart: unless-stopped
    volumes:
      - factory_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/main.js"]
    ports:
      - "127.0.0.1:3096:3000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      WORKER_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/worker.js"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: factory_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8090:80"

volumes:
  factory_pg:
  factory_redis:
